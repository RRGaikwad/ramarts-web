<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>RamArts Admin — Website CMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div id="admin-login" class="admin-login">
    <div class="admin-login-card">
      <h1>Ram<span style="color:#00a3ff">Arts</span> Admin</h1>
      <p>Sign in to edit your website content. Turn on live preview anytime when you want to see changes.</p>
      <form id="login-form">
        <div class="admin-field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required placeholder="Enter admin password" autofocus>
        </div>
        <p id="login-error" style="color:#ef4444;font-size:0.85rem;margin-bottom:1rem;min-height:1.25rem"></p>
        <button type="submit" class="admin-btn admin-btn-primary" style="width:100%">Sign In</button>
      </form>
      <p class="admin-hint" style="margin-top:1rem;text-align:center">Default password: <code>ramarts2026</code> — change it after first login.</p>
    </div>
  </div>

  <div id="admin-layout" class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-sidebar-header">
        <h1>Ram<span>Arts</span> CMS</h1>
        <p class="admin-hint">Live content editor</p>
      </div>
      <nav class="admin-nav">
        <button type="button" class="admin-nav-btn active" data-panel="business"><i class="fas fa-building"></i> Business & SEO</button>
        <button type="button" class="admin-nav-btn" data-panel="hero"><i class="fas fa-image"></i> Hero Section</button>
        <button type="button" class="admin-nav-btn" data-panel="sections"><i class="fas fa-layer-group"></i> Sections & Counters</button>
        <button type="button" class="admin-nav-btn" data-panel="services"><i class="fas fa-print"></i> Services</button>
        <button type="button" class="admin-nav-btn" data-panel="testimonials"><i class="fas fa-star"></i> Testimonials</button>
        <button type="button" class="admin-nav-btn" data-panel="faq"><i class="fas fa-question-circle"></i> FAQ</button>
        <button type="button" class="admin-nav-btn" data-panel="cta"><i class="fas fa-bullhorn"></i> CTA & Footer</button>
      </nav>
      <div class="admin-sidebar-footer">
        <button type="button" class="admin-btn admin-btn-primary admin-btn-sm" id="btn-sidebar-preview"><i class="fas fa-desktop"></i> Toggle Live Preview</button>
        <button type="button" class="admin-btn admin-btn-sm" id="btn-view-site"><i class="fas fa-external-link-alt"></i> View Live Site</button>
        <button type="button" class="admin-btn admin-btn-sm" id="btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </aside>

    <main class="admin-editor">
      <div class="admin-editor-header">
        <div>
          <h2 id="editor-title">Business & SEO</h2>
          <span class="admin-status" id="save-status"><i class="fas fa-check"></i> Saved — preview updated</span>
        </div>
        <div class="admin-actions-bar">
          <button type="button" class="admin-btn admin-btn-primary admin-btn-sm" id="btn-toggle-preview" aria-pressed="false">
            <i class="fas fa-eye"></i> <span id="toggle-preview-label">Show Live Preview</span>
          </button>
          <button type="button" class="admin-btn admin-btn-sm" id="btn-preview-tab"><i class="fas fa-external-link-alt"></i> Open in New Tab</button>
          <button type="button" class="admin-btn admin-btn-sm" id="btn-export"><i class="fas fa-download"></i> Export</button>
          <button type="button" class="admin-btn admin-btn-sm" id="btn-import"><i class="fas fa-upload"></i> Import</button>
          <input type="file" id="import-file" accept=".json" hidden>
          <button type="button" class="admin-btn admin-btn-danger admin-btn-sm" id="btn-reset"><i class="fas fa-undo"></i> Reset</button>
        </div>
      </div>

      <div id="panel-business" class="admin-panel active"></div>
      <div id="panel-hero" class="admin-panel"></div>
      <div id="panel-sections" class="admin-panel"></div>
      <div id="panel-services" class="admin-panel"></div>
      <div id="panel-testimonials" class="admin-panel"></div>
      <div id="panel-faq" class="admin-panel"></div>
      <div id="panel-cta" class="admin-panel"></div>
    </main>

    <section class="admin-preview" id="admin-preview-panel" hidden>
      <div class="admin-preview-toolbar">
        <label for="preview-page" style="font-size:0.85rem;color:var(--admin-muted)">Page:</label>
        <select id="preview-page"></select>
        <button type="button" class="admin-btn admin-btn-sm" id="preview-refresh" title="Refresh preview"><i class="fas fa-sync"></i></button>
        <button type="button" class="admin-btn admin-btn-sm" id="preview-fullscreen" title="Fullscreen preview"><i class="fas fa-expand"></i></button>
        <button type="button" class="admin-btn admin-btn-sm" id="btn-hide-preview"><i class="fas fa-times"></i> Close</button>
      </div>
      <iframe id="preview-frame" class="admin-preview-frame" title="Live preview"></iframe>
    </section>

    <div class="admin-preview-modal" id="preview-modal" hidden aria-hidden="true">
      <div class="admin-preview-modal-header">
        <select id="preview-page-modal"></select>
        <div>
          <button type="button" class="admin-btn admin-btn-sm" id="preview-modal-refresh"><i class="fas fa-sync"></i></button>
          <button type="button" class="admin-btn admin-btn-sm" id="preview-modal-close"><i class="fas fa-times"></i> Close</button>
        </div>
      </div>
      <iframe id="preview-frame-modal" class="admin-preview-modal-frame" title="Fullscreen preview"></iframe>
    </div>
  </div>

  <script src="js/site-content.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
